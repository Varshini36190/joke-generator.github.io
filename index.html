<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joke Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f3e5f5;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #ab47bc;
            margin-bottom: 20px;
        }
        .joke-card {
            background: linear-gradient(135deg, #ce93d8, #ab47bc);
            color: white;
            padding: 20px 30px;
            border-radius: 15px;
            max-width: 500px;
            min-height: 100px;
            text-align: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(20px);
            animation: slideIn 0.5s forwards;
            position: relative;
        }
        .joke-card::before {
            content: '😂';
            position: absolute;
            top: -20px;
            left: -20px;
            font-size: 30px;
            opacity: 0.5;
        }
        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #ab47bc;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }
        button:hover {
            background-color: #8e24aa;
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        @media (max-width: 600px) {
            .joke-card {
                max-width: 90%;
                font-size: 16px;
                padding: 15px 20px;
            }
            h1 {
                font-size: 24px;
            }
            button {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <h1>Joke Generator</h1>
    <div class="joke-card" id="joke-card">Click "Tell Me a Joke" to start laughing!</div>
    <div class="buttons">
        <button onclick="tellJoke()">Tell Me a Joke</button>
        <button onclick="resetJoke()">Reset</button>
    </div>
    <script>
        const jokes = [
            "Why did the scarecrow become a comedian? Because he was outstanding in his field!",
            "What do you call a bear with no shoes? Barefoot!",
            "Why don’t programmers prefer dark mode? Because the light attracts bugs!",
            "What do you call a dinosaur that loves to sing? A Rockstaraptor!",
            "Why did the tomato turn red? It saw the salad dressing!",
            "What do you call a lazy kangaroo? A pouch potato!",
            "Why was the math book sad? Too many problems!",
            "What do you call a musical computer? A Dell-tones!",
            "Why did the coffee go to art school? It loved to draw a brew!",
            "What do you call a fake noodle? An impasta!"
        ];
        const jokeCard = document.getElementById('joke-card');

        function tellJoke() {
            const randomJoke = jokes[Math.floor(Math.random() * jokes.length)];
            jokeCard.style.animation = 'none'; // Reset animation
            jokeCard.offsetHeight; // Trigger reflow
            jokeCard.style.animation = 'slideIn 0.5s forwards';
            jokeCard.textContent = randomJoke;
        }

        function resetJoke() {
            jokeCard.style.animation = 'none';
            jokeCard.offsetHeight;
            jokeCard.style.animation = 'slideIn 0.5s forwards';
            jokeCard.textContent = 'Click "Tell Me a Joke" to start laughing!';
        }
    </script>
</body>
</html>
